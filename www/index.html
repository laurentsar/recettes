<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a120b" />
<title>Recettes</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="img/icon-192.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="topbar">
    <div id="hero">
      <div>
        <div id="hero-title">🍲 Recettes</div>
        <div id="hero-sub"></div>
      </div>
      <button id="photos-btn" title="Récupérer photos + titres manquants depuis le lien" aria-label="Photos manquantes">📷</button>
      <button id="import-btn" title="Importer une recette" aria-label="Importer">⬇</button>
      <button id="sync-btn" title="Synchroniser les recettes" aria-label="Synchroniser">↻</button>
    </div>
    <input id="search" type="search" placeholder="Rechercher (titre, ingrédient…)" autocomplete="off" />
    <div id="cats"></div>
  </header>

  <main id="main">
    <div id="daily"></div>
    <div id="status" class="status"></div>
    <div id="grid"></div>
  </main>

  <div id="detail" class="detail" hidden></div>
  <div id="edit" class="editview" hidden></div>
  <div id="ingpick" class="editview" hidden></div>
  <div id="cook" class="cook" hidden></div>
  <div id="catpick" class="catpick-modal" hidden></div>
  <div id="import" class="editview" hidden></div>
  <div id="toast" class="toast" hidden></div>

<details id="backup-details" style="margin:16px auto;max-width:900px;padding:0 12px">
  <summary style="cursor:pointer;font-weight:600;padding:8px 0">💾 Sauvegarde des données</summary>
  <p style="font-size:13px;opacity:.8">Tes données vivent sur ce téléphone : désinstaller l'app
  les efface. Renseigne Home Assistant ci-dessous et la sauvegarde devient automatique.</p>
  <div id="backup-panel"></div>
</details>


  <script src="app.js"></script>
  <script>window.UPDATE_REPO='laurentsar/recettes';window.APP_VERSION='2.15';</script>
  <script src="update-check.js" defer></script>
  <script>window.BACKUP_APP = 'recettes-app'; window.BACKUP_SKIP = [/^recipesData$/];</script>
  <script src="autobackup.js"></script>
  <script>AutoBackup.mount(document.getElementById('backup-panel'));</script>
</body>
</html>
