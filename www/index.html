<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#1a120b" />
<title>Recettes</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" href="img/icon-192.png" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header id="topbar">
    <div id="hero">
      <div>
        <div id="hero-title">🍲 Recettes</div>
        <div id="hero-sub"></div>
      </div>
      <button id="sync-btn" title="Synchroniser les recettes" aria-label="Synchroniser">↻</button>
    </div>
    <input id="search" type="search" placeholder="Rechercher (titre, ingrédient…)" autocomplete="off" />
    <div id="cats" class="chips"></div>
  </header>

  <main id="main">
    <div id="daily"></div>
    <div id="status" class="status"></div>
    <div id="grid"></div>
  </main>

  <div id="detail" class="detail" hidden></div>
  <div id="edit" class="editview" hidden></div>
  <div id="ingpick" class="editview" hidden></div>
  <div id="toast" class="toast" hidden></div>

  <script src="app.js"></script>
</body>
</html>
